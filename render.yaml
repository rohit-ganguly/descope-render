services:
  - type: web
    name: descope-render
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run fastmcp run server.py --transport http --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DESCOPE_CONFIG_URL
        sync: false
